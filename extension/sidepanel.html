<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeScope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e5e5e5;
      display: flex;
      flex-direction: column;
    }
    .sidepanel-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2d2d2d;
    }
    .sidepanel-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }
    .sidepanel-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.2s, color 0.2s;
    }
    .sidepanel-close:hover {
      background: #2d2d2d;
      color: #fff;
    }
    .sidepanel-body {
      flex: 1;
      min-height: 0;
      background: #1a1a1a;
      position: relative;
    }
    /* 未登录门禁视图 */
    .gate-view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .gate-icon {
      width: 56px;
      height: 56px;
      object-fit: contain;
      margin-bottom: 24px;
      display: block;
    }
    .gate-title {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }
    .gate-desc {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.6;
      text-align: center;
    }
    .gate-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #magic-link-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #magic-link-form input {
      width: 100%;
      padding: 10px 14px;
      background: #2d2d2d;
      border: 1px solid #3d3d3d;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    #magic-link-form input:focus {
      border-color: #2563eb;
    }
    #magic-link-form input::placeholder {
      color: #666;
    }
    #send-magic-btn {
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    #send-magic-btn:hover:not(:disabled) {
      background: #1d4ed8;
    }
    #send-magic-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .login-error {
      font-size: 13px;
      color: #ef4444;
      text-align: left;
    }
    /* 已登录视图 */
    .logged-in-view {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .logged-in-title {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
    }
    .logged-in-email {
      font-size: 15px;
      color: #fff;
      font-weight: 500;
      margin-bottom: 24px;
    }
    .logged-in-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .logged-in-actions a {
      display: block;
      width: 100%;
      padding: 10px;
      background: #2d2d2d;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
    }
    .logged-in-actions a:hover {
      background: #3d3d3d;
    }
    #logout-btn {
      padding: 10px;
      background: transparent;
      color: #ef4444;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    #logout-btn:hover {
      background: #2d2d2d;
    }
  </style>
</head>
<body>
  <header class="sidepanel-header">
    <span class="sidepanel-title">HomeScope</span>
    <button type="button" class="sidepanel-close" id="sidepanel-close" title="关闭侧边栏" aria-label="关闭">×</button>
  </header>
  <main class="sidepanel-body">
    <!-- 未登录视图 -->
    <div id="gate-view" class="gate-view">
      <img id="gate-icon-img" class="gate-icon" alt="HomeScope" />
      <h2 class="gate-title">登录 HomeScope</h2>
      <p id="gate-desc" class="gate-desc">输入邮箱，我们会发送一个登录链接给你。</p>
      <div id="gate-content" class="gate-content">
        <form id="magic-link-form">
          <input
            type="email"
            id="magic-email"
            placeholder="your@email.com"
            required
            autocomplete="email"
          />
          <button type="submit" id="send-magic-btn">发送登录链接</button>
        </form>
        <p id="login-error" class="login-error" style="display:none"></p>
      </div>
    </div>
    <!-- 已登录视图 -->
    <div id="logged-in-view" class="logged-in-view">
      <p class="logged-in-title">已登录 HomeScope</p>
      <p id="logged-in-email" class="logged-in-email"></p>
      <div class="logged-in-actions">
        <a href="https://www.tryhomescope.com/account" target="_blank">前往账户</a>
        <button type="button" id="logout-btn">退出登录</button>
      </div>
    </div>
  </main>
  <script src="sidepanel.js"></script>
</body>
</html>
