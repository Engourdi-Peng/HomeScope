<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeScope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e5e5e5;
      display: flex;
      flex-direction: column;
    }
    /* 顶部标题栏（类似 Monica 吸附侧栏） */
    .sidepanel-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2d2d2d;
    }
    .sidepanel-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }
    .sidepanel-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.2s, color 0.2s;
    }
    .sidepanel-close:hover {
      background: #2d2d2d;
      color: #fff;
    }
    /* 内容区：登录 iframe 填满剩余空间 */
    .sidepanel-body {
      flex: 1;
      min-height: 0;
      background: #fff;
    }
    .sidepanel-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <header class="sidepanel-header">
    <span class="sidepanel-title">HomeScope</span>
    <button type="button" class="sidepanel-close" id="sidepanel-close" title="关闭侧边栏" aria-label="关闭">×</button>
  </header>
  <main class="sidepanel-body">
    <iframe
      id="login-frame"
      src="https://www.tryhomescope.com/login?from=extension"
      allow="cross-origin-isolated"
    ></iframe>
  </main>
  <script src="sidepanel.js"></script>
</body>
</html>
