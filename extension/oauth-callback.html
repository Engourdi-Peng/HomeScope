<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HomeScope - Logging In...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f9fafb;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 90%;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h2 { color: #111827; margin: 0 0 8px; }
    p  { color: #6b7280; margin: 0; }
    .success { color: #10b981; }
    .error   { color: #ef4444; }
    .hidden  { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading">
      <div class="spinner"></div>
      <h2>Logging In...</h2>
      <p>Please wait while we set up your session.</p>
    </div>
    <div id="success" class="hidden">
      <h2 class="success">Logged In!</h2>
      <p>HomeScope extension is ready. You can close this page.</p>
    </div>
    <div id="error" class="hidden">
      <h2 class="error">Login Failed</h2>
      <p id="error-message"></p>
    </div>
  </div>
  <script src="oauth-callback.js"></script>
</body>
</html>
