<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    
    <!-- SEO -->
    <title>HomeScope | AI Property Analyzer for Zillow Listings</title>
    <meta name="description" content="HomeScope helps home buyers review Zillow and realestate.com.au listings before booking a showing. Get AI property risk checks, photo and condition review, price confidence, and questions to ask the agent." />
    <meta name="robots" content="index,follow" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://www.tryhomescope.com/" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="HomeScope | AI Property Analyzer for Zillow Listings" />
    <meta property="og:description" content="Review Zillow and realestate.com.au listings before you book a showing. HomeScope checks listing risks, photos, price confidence, and questions to ask the agent." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.tryhomescope.com/" />
    <meta property="og:image" content="https://www.tryhomescope.com/og-image.png" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HomeScope | AI Property Analyzer for Zillow Listings" />
    <meta name="twitter:description" content="AI property risk reports for home buyers reviewing Zillow and realestate.com.au listings." />
    <meta name="twitter:image" content="https://www.tryhomescope.com/og-image.png" />
    
    <!-- FAQ JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Does HomeScope work with Zillow?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. HomeScope works with supported Zillow property listing pages and helps buyers generate AI-powered property risk reports before booking a showing."
          }
        },
        {
          "@type": "Question",
          "name": "Is HomeScope affiliated with Zillow?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. HomeScope is an independent tool and is not affiliated with, endorsed by, or sponsored by Zillow."
          }
        },
        {
          "@type": "Question",
          "name": "What does a Full Property Report check?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A Full Property Report reviews listing details, photos, visible condition signals, price confidence, missing information, potential risks, and questions to ask the agent."
          }
        },
        {
          "@type": "Question",
          "name": "Does HomeScope replace a home inspection?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. HomeScope does not replace a home inspection, appraisal, legal advice, or financial advice. It helps buyers spot listing-level risks and prepare better questions before spending time or money."
          }
        },
        {
          "@type": "Question",
          "name": "Can I try HomeScope for free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. You can try a free Basic Check, and new users receive free Full Reports after signing up."
          }
        }
      ]
    }
    </script>
    
    <!-- SoftwareApplication JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "HomeScope",
      "applicationCategory": "BrowserApplication",
      "operatingSystem": "Chrome",
      "description": "AI property analyzer for home buyers reviewing Zillow and realestate.com.au listings before booking a showing.",
      "offers": {
        "@type": "Offer",
        "price": "9.99",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
